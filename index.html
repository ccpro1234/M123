



<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Genuis Baccarat • Premium</title>

<style>
.summary{
 margin:10px auto 14px;
 padding:12px;
 max-width:520px;
 background:linear-gradient(180deg,#050505,#101010);
 border-radius:12px;
 box-shadow:inset 0 0 0 1px rgba(255,215,0,.25);
 font-size:16px;
 line-height:1.6;
}
.summary b{color:#ffd700}

*{box-sizing:border-box}
body{
 margin:0;
 padding:12px;
 font-family:"Segoe UI",Arial;
 background:radial-gradient(circle at top,#2a2a2a 0%,#050505 65%);
 color:#eee;
}
.container{
 max-width:1450px;
 margin:auto;
 background:linear-gradient(180deg,#141414,#0b0b0b);
 padding:18px;
 border-radius:16px;
 box-shadow:0 0 40px rgba(255,215,0,.18),
 inset 0 0 0 1px rgba(255,215,0,.18);
}
h1{
 text-align:center;
 color:#ffd700;
 margin:6px 0 14px;
 letter-spacing:1px;
 text-shadow:0 0 10px rgba(255,215,0,.4);
font-size:20px;   /* 🔥 ลดขนาดตรงนี้ */
}



.controls{
 display:flex;
 flex-wrap:wrap;
 justify-content:center;
 gap:10px;
 margin-bottom:12px;
}
button{
 padding:10px 20px;
 font-size:15px;
 font-weight:600;
 border:none;
 border-radius:10px;
 cursor:pointer;
 color:#fff;
 box-shadow:inset 0 0 0 1px rgba(255,255,255,.18),
 0 6px 14px rgba(0,0,0,.7);
 transition:.18s;
}
button:hover{transform:translateY(-1px);opacity:.92}
.player{background:linear-gradient(#3498db,#1f4f7a)}
.banker{background:linear-gradient(#e74c3c,#7f1d1d)}
.tie{background:linear-gradient(#2ecc71,#1e8449)}
.undo{background:linear-gradient(#9b59b6,#5e3370)}
.clear{background:linear-gradient(#95a5a6,#5f6a6a)}
.stats{text-align:center;font-size:16px;margin-bottom:12px}

.road-wrapper{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.road{
 background:linear-gradient(180deg,#000,#090909);
 padding:12px;
 border-radius:14px;
 box-shadow:inset 0 0 0 1px rgba(255,215,0,.18),
 0 0 16px rgba(0,0,0,.9);
}
.road h3{text-align:center;margin:0 0 6px;font-size:15px;color:#ffd700}
.grid{
 display:grid;
 grid-template-columns:repeat(60,26px);
 grid-template-rows:repeat(6,26px);
 gap:3px;
 overflow:hidden;
}
.cell{
 width:26px;height:26px;border-radius:50%;
 display:flex;align-items:center;justify-content:center;
 font-size:13px;font-weight:bold;
 box-shadow:inset 0 0 0 1px rgba(255,255,255,.2);
}
.B{background:#c0392b}
.P{background:#2980b9}
.T{background:#27ae60;font-size:11px}

.analysis-grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
 gap:14px;
}
.analysis{
 background:linear-gradient(180deg,#060606,#121212);
 padding:14px;
 border-radius:16px;
 box-shadow:inset 0 0 0 1px rgba(255,215,0,.22),
 0 0 14px rgba(0,0,0,.9);
}
.analysis h3{margin:0 0 4px;font-size:14px;color:#ffd700}
.desc{font-size:12px;color:#bfbfbf}
.per{font-size:13px;margin-top:2px}
.best{
 color:#00ff99;
 font-weight:900;
 font-size:3em;
 text-shadow:0 0 14px rgba(0,255,153,.9);
 animation:blink .9s infinite;
}
@keyframes blink{50%{opacity:.35}}
.dna-row{
 font-size:15px;
 word-break:break-all;
 margin-top:4px;
}

/* ===== DQN RESULT BAR ===== */
.dqn-dna{
 margin-top:8px;
 font-size:18px;
 letter-spacing:4px;
}

.dqn-stat{
 margin-top:6px;
 font-size:14px;
 color:#00ffff;
}


</style>
</head>

<body>


<!-- 🔐 LOGIN -->
<div id="loginBox" style="
 max-width:360px;
 margin:80px auto;
 padding:20px;
 background:#111;
 border-radius:14px;
 box-shadow:0 0 20px rgba(255,215,0,.3);
 text-align:center;
">
 <h2 style="color:#ffd700">🔐 LOGIN</h2>
 <input id="user" placeholder="User" style="width:100%;padding:10px;margin:6px 0;border-radius:8px"><br>
 <input id="pass" type="password" placeholder="Password" style="width:100%;padding:10px;margin:6px 0;border-radius:8px"><br>
 <button onclick="login()" style="margin-top:10px;padding:10px 20px;border-radius:10px;background:#ffd700;font-weight:bold">
  LOGIN
 </button>
 <div id="err" style="color:red;display:none;margin-top:6px">❌ Login ผิด</div>
</div>

<div id="app" style="display:none">

<div class="container">
<h1 style="
 display:flex;
 align-items:center;
 justify-content:center;
 gap:14px;
">

 <img src="robotcouth3.png"
      style="
        height:140px;
        width:auto;
        filter:
          drop-shadow(0 0 10px rgba(0,255,255,.6))
          drop-shadow(0 0 20px rgba(255,215,0,.4));
      ">

 Genuis Baccarat 24 สาย วิศวะฯ เพิ่ม DQN Ai จดจำเค้าไพ่ 4 ตาย้อนหลังได้

</h1>

<div id="dqnBox" style="
 margin:12px auto 18px;
 padding:14px;
 max-width:620px;
 background:linear-gradient(180deg,#001a1a,#003333);
 border-radius:16px;
 box-shadow:0 0 18px rgba(0,255,255,.25),
 inset 0 0 0 1px rgba(0,255,255,.35);
 text-align:center;
">

 <div style="font-size:18px;font-weight:bold;color:#00ffff">
  🤖 DQN MODE
 </div>

 <div id="dqnStatus" style="margin-top:6px;font-size:14px">
  สถานะ: OFF
 </div>

 <div id="dqnInfo" style="margin-top:8px;font-size:15px">
  รอข้อมูล...
 </div>

 <button onclick="toggleDQN()" style="
  margin-top:10px;
  padding:8px 16px;
  border-radius:10px;
  border:none;
  font-weight:bold;
  background:linear-gradient(#00cccc,#006666);
  color:#000;">
  เปิด / ปิด DQN
 </button>
</div>

<div class="controls">
<button class="player" onclick="addResult('P')">PLAYER</button>
<button class="banker" onclick="addResult('B')">BANKER</button>
<button class="tie" onclick="addResult('T')">TIE</button>
<button class="undo" onclick="undo()">UNDO</button>
<button class="clear" onclick="clearAll()">CLEAR</button>
</div>

<div class="stats" id="stats"></div>

<div class="summary">
  <div id="expireShow" style="margin-bottom:6px;color:#ffd700;font-weight:bold"></div>
  <div id="summary">📊 รอข้อมูล...</div>
</div>

<div class="road-wrapper">
 <div class="road">
  <h3>Bead Road</h3>
  <div class="grid" id="bead"></div>
 </div>
 <div class="road">
  <h3>Big Road</h3>
  <div class="grid" id="bigroad"></div>
 </div>
</div>

<div class="analysis-grid" id="analysisGrid"></div>
</div>

<script>

// ===== 🔒 EXPIRE SYSTEM =====
const EXPIRE_DATE = new Date(2026, 2, 16, 0, 0, 0);
// 16 มีนาคม พ.ศ.2569 (ค.ศ.2026)

if(new Date() > EXPIRE_DATE){
  document.body.innerHTML = `
    <div style="
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#000;
      color:#ffd700;
      font-size:22px;
      font-weight:bold;
      text-align:center;">
      ❌ โปรแกรมหมดอายุแล้ว<br>
      หมดอายุวันที่: ${EXPIRE_DATE.toLocaleDateString('th-TH')}
    </div>
  `;
  throw new Error("Program Expired");
}

// ✅ แสดงวันหมดอายุ
document.addEventListener("DOMContentLoaded", ()=>{
  const options = { day: 'numeric', month: 'long', year: 'numeric' };
  const d = EXPIRE_DATE.toLocaleDateString('th-TH', options);

  const year = d.split(" ")[2];
  const formatted = d.replace(year, "พ.ศ. " + year);

  const el = document.getElementById("expireShow");
  if(el){
    el.innerHTML = "⏳ วันหมดอายุ: " + formatted;
  }
});

function login(){
 const u=document.getElementById('user').value;
 const p=document.getElementById('pass').value;
 if(u==="1234" && p==="1234"){
   document.getElementById('loginBox').style.display="none";
   document.getElementById('app').style.display="block";
 }else{
   document.getElementById('err').style.display="block";
 }
}

let history=[]
let STRATEGY_COUNT=24
let last=Array(STRATEGY_COUNT).fill(null)
let dna=Array.from({length:STRATEGY_COUNT},()=>[])

// ===== DQN ENGINE =====
let dqnMode = false
let Q = {}
let epsilon = 0.1
let alpha = 0.2
let gamma = 0.9
let dqnLastState = null
let dqnLastAction = null

// ===== ADVANCED MEMORY AI =====
let patternMemory = {}
let MEMORY_DEPTH = 4   // ดูย้อนหลัง 4 ตา

// ===== DQN STATS =====
let dqnHistory = []
let dqnWin = 0
let dqnLose = 0

function getState(s){
 if(s.length < 8) return null
 return s.slice(-8).join('')
}


function getQ(state){
 if(!Q[state]){
  Q[state] = {P:0, B:0}
 }
 return Q[state]
}

// ===== ADVANCED MEMORY FUNCTIONS =====
function getLongPattern(s){
  if(s.length < MEMORY_DEPTH) return null
  return s.slice(-MEMORY_DEPTH).join('')
}

function updatePatternMemory(state, result){
  if(!patternMemory[state]){
    patternMemory[state] = {P:0, B:0}
  }
  patternMemory[state][result]++
}

function getPatternPrediction(state){
  if(!patternMemory[state]) return null

  let data = patternMemory[state]
  return data.P >= data.B ? 'P' : 'B'
}

function chooseAction(state){
 let q = getQ(state)

 if(Math.random() < epsilon){
  return Math.random()<0.5?'P':'B'
 }

 return q.P >= q.B ? 'P' : 'B'
}

function toggleDQN(){
 dqnMode = !dqnMode

 document.getElementById("dqnStatus").innerHTML =
  "สถานะ: " + (dqnMode ? "<b style='color:#00ff99'>ON</b>" : "<b style='color:#ff4444'>OFF</b>")

 if(!dqnMode){
   const box = document.getElementById("dqnInfo")
   if(box) box.innerHTML = "รอข้อมูล..."
 }
}



function addResult(r){

 history.push(r)

 // ===== 24 STRATEGY LEARN =====
 let s = history.filter(x => x !== 'T')

 if (s.length > 1 && r !== 'T') {
   strategyDefs.forEach((def,i)=>{
     if(last[i] !== null){
       dna[i].push(last[i] === r ? '✅' : '❌')

       // เก็บไม่เกิน 50 ช่อง
       if(dna[i].length > 50) dna[i].shift()
     }
   })
 }

// ===== DQN LEARN =====
if(dqnMode && dqnLastState && r !== 'T'){

   let reward = (r === dqnLastAction) ? 1 : -1
   let q = getQ(dqnLastState)

   let cleanHistory = history.filter(x => x !== 'T')
   let nextState = getState(cleanHistory)
   let nextQ = nextState ? getQ(nextState) : {P:0,B:0}
   let maxNext = Math.max(nextQ.P, nextQ.B)

   q[dqnLastAction] += alpha * (
     reward + gamma * maxNext - q[dqnLastAction]
   )

   if(reward === 1){
     dqnHistory.push("✅")
     dqnWin++
   }else{
     dqnHistory.push("❌")
     dqnLose++
   }

   if(dqnHistory.length > 50) dqnHistory.shift()
}

// ===== LONG PATTERN LEARN =====
let cleanHistory = history.filter(x => x !== 'T')
let longState = getLongPattern(cleanHistory)

if(longState && r !== 'T'){
  updatePatternMemory(longState, r)
}

// ✅ render ต้องอยู่นอก if
render()
}


function undo(){

 if(history.length === 0) return

 history.pop()

 const oldHistory = [...history]

 // ปิด DQN ชั่วคราวกัน render รัว
 const prevMode = dqnMode
 dqnMode = false

 clearAll()

 oldHistory.forEach(r=>{
   history.push(r)
 })

 // เปิด DQN กลับ
 dqnMode = prevMode

 render()
}


function clearAll(){
 history=[]
 dna=Array.from({length:STRATEGY_COUNT},()=>[])
 last=Array(STRATEGY_COUNT).fill(null)

 // รีเซ็ต DQN
 Q={}
 dqnLastState=null
 dqnLastAction=null

 // ===== รีเซ็ตสถิติ DQN =====
 dqnHistory=[]
 dqnWin=0
 dqnLose=0

 // ✅ กันหน้าจอ DQN ค้าง
 const box = document.getElementById("dqnInfo")
 if(box) box.innerHTML = "รอข้อมูล..."

 render()
}


const acc=a=>a.length?Math.round(a.filter(x=>x==='✅').length/a.length*100):0
const lastOf=s=>s[s.length-1]
const opp=s=>s==='B'?'P':'B'
const cnt=(s,x)=>s.filter(v=>v===x).length

function render(){
 stats.textContent=`B:${cnt(history,'B')} | P:${cnt(history,'P')} | T:${cnt(history,'T')}`
 renderBead();renderBig();analyze()
}

function renderBead(){
 bead.innerHTML=""
 history.forEach((r,i)=>{
  let d=document.createElement("div")
  d.className="cell "+r
  d.textContent=r
  d.style.gridColumn=Math.floor(i/6)+1
  d.style.gridRow=i%6+1
  bead.appendChild(d)
 })
}

function renderBig(){
 bigroad.innerHTML=""
 let col=1,row=1,lastR=null,used={}
 history.forEach(r=>{
  if(r==='T')return
  if(lastR===null){col=1;row=1}
  else if(r===lastR){
   if(row<6 && !used[col+','+(row+1)])row++
   else col++
  }else{col++;row=1}
  used[col+','+row]=1
  let d=document.createElement("div")
  d.className="cell "+r
  d.textContent=r
  d.style.gridColumn=col
  d.style.gridRow=row
  bigroad.appendChild(d)
  lastR=r
 })
}

const strategyDefs=[
 ["Majority","ฝั่งรวม",(s)=>cnt(s,'B')>=cnt(s,'P')?'B':'P'],
 ["StreakCut","ตัดยาว",(s)=>s.slice(-3).every(v=>v===lastOf(s))?opp(lastOf(s)):lastOf(s)],
 ["FlipBias","ดูการกลับ",(s)=>cnt(s.slice(-5),'B')%2?'P':'B'],
 ["Window6","หน้าต่าง6",(s)=>cnt(s.slice(-6),'B')>=4?'B':'P'],
 ["Window8","หน้าต่าง8",(s)=>cnt(s.slice(-8),'P')>=5?'P':'B'],
 ["Echo","สะท้อน",(s)=>s.length>2?s[s.length-3]:lastOf(s)],
 ["Inertia","แรงค้าง",(s)=>cnt(s.slice(-4),lastOf(s))>=3?lastOf(s):opp(lastOf(s))],
 ["Parity","เลขคู่",(s)=>s.length%2?lastOf(s):opp(lastOf(s))],
 ["Ratio","อัตราส่วน",(s)=>cnt(s,'B')/(cnt(s,'P')+1)>1.15?'B':'P'],
 ["Pulse","ชีพจร",(s)=>cnt(s.slice(-10),'B')===cnt(s.slice(-10),'P')?lastOf(s):opp(lastOf(s))],

 ["Wave","คลื่น",(s)=>cnt(s.slice(-7),'B')>cnt(s.slice(-7),'P')?'P':'B'],
 ["Rebound","เด้งกลับ",(s)=>s.slice(-2)[0]===s.slice(-2)[1]?opp(lastOf(s)):lastOf(s)],
 ["Density","ความหนา",(s)=>cnt(s.slice(-9),lastOf(s))>=6?opp(lastOf(s)):lastOf(s)],
 ["Shadow","เงาหลัง",(s)=>s.length>1?opp(s[s.length-2]):lastOf(s)],
 ["Drift","ไหล",(s)=>cnt(s.slice(-12),'B')>cnt(s.slice(-12),'P')?'B':'P'],
 ["Anchor","จุดยึด",(s)=>cnt(s.slice(-5),'B')===3?'B':'P'],
 ["Snap","หักฉับ",(s)=>cnt(s.slice(-4),'B')===2?opp(lastOf(s)):lastOf(s)],
 ["Swing","แกว่ง",(s)=>cnt(s.slice(-6),'P')>=4?'B':'P'],
 ["Focus","โฟกัส",(s)=>cnt(s.slice(-3),'B')>=2?'B':'P'],
 ["Mirror2","กระจก2",(s)=>s.length>3?s[s.length-4]:lastOf(s)],
 ["Pressure","แรงกด",(s)=>cnt(s.slice(-8),'B')>=6?'P':'B'],
 ["Tilt","เอียง",(s)=>cnt(s.slice(-10),'P')-cnt(s.slice(-10),'B')>=3?'P':'B'],
 ["Edge","ขอบ",(s)=>cnt(s.slice(-11),'B')%3?'B':'P'],
 ["Stability","เสถียร",(s)=>cnt(s.slice(-6),lastOf(s))>=4?lastOf(s):opp(lastOf(s))]
]

function analyze(){
 let s=history.filter(x=>x!=='T')
 analysisGrid.innerHTML=""
if(s.length<6){

 if(dqnMode){
   const box = document.getElementById("dqnInfo")
   if(box) box.innerHTML="รอข้อมูล..."
 }

 summary.textContent="📊 รอข้อมูล..."
 return
}

let accList = dna.map(acc)
let maxAcc = Math.max(...accList)

if(maxAcc === 0){
  maxAcc = -1   // กันไม่ให้ highlight ทุกสายตอนยังไม่เรียนรู้
}
let pCount=0
let bCount=0


 // ===== DQN PREDICT =====
 let dqnPick = null

 if(dqnMode){
   let state = getState(s)


   if(state){
     let q = getQ(state)

     dqnPick = chooseAction(state)

// ===== PATTERN MEMORY BOOST =====
let longState = getLongPattern(s)
let memoryPick = getPatternPrediction(longState)

let memoryStatusText = ""
let memoryCount = 0

if(memoryPick){
   let mem = patternMemory[longState]
   memoryCount = mem.P + mem.B

   if(memoryCount > 1){

      dqnPick = memoryPick

      let percentP = Math.round(mem.P / memoryCount * 100)
      let percentB = Math.round(mem.B / memoryCount * 100)

      memoryStatusText = `
        <div style="margin-top:10px;
                    padding:8px;
                    background:#002222;
                    border-radius:10px;
                    border:1px solid #00ffaa">

             <b style="color:#00ffcc">ระบบจดจำเค้าไพ่: ทำงาน</b><br>

          🔁 เค้าไพ่ 4 ตานี้เคยเกิด: 
          <b style="color:#ffd700">${memoryCount} ครั้ง</b><br>

          📊 ออก P = ${mem.P} ครั้ง (${percentP}%)<br>
          📊 ออก B = ${mem.B} ครั้ง (${percentB}%)<br><br>

          🎯 <b style="color:#00ff99;font-size:16px">
          แนะนำเดิมพัน: ${memoryPick}
          </b>

        </div>
      `
   }
}


     dqnLastState = state
     dqnLastAction = dqnPick

    const box = document.getElementById("dqnInfo")

if (box) {

  const total = dqnWin + dqnLose
  const percent = total 
    ? Math.round(dqnWin / total * 100) 
    : 0

let advice = ""

if(percent < 50){
  advice = "🔁 <b style='color:#ff4444'>ตานี้ควรเล่นสวน</b>"
}
else if(percent === 50){

  const helperPick = q.P >= q.B ? 'P' : 'B'

  advice = `
    ⚖️ <b style='color:#ffd700'>50% (กลาง) จะหยุดรอ หรือ จะ แทงตาม ผู้ช่วยแนะนำ ด้านล่าง ผู้เล่นตัดสินใจเอง</b><br>
    🤖 <b style='color:#00ffff'>
    ผู้ช่วยแนะนำ: แทง ${helperPick}
    </b>
  `
}
else{
  advice = "✅ <b style='color:#00ff99'>ตานี้ควรเล่นตาม</b>"
}


  box.innerHTML = `
  State: <b>${state}</b><br>
  Q(P) = ${q.P.toFixed(2)} |
  Q(B) = ${q.B.toFixed(2)}<br>
  เลือก: <b style="color:#00ffcc;font-size:18px">
    ${dqnPick}
  </b>

  <div class="dqn-dna">
    ${dqnHistory.join(" ")}
  </div>

  <div class="dqn-stat">
    ชนะ ${dqnWin} | แพ้ ${dqnLose} |
    ความแม่นยำ ${percent}%
  </div>

  <div style="margin-top:8px;font-size:16px">
    ${advice}
  </div>

  ${memoryStatusText}
`
}

}

} // 👈 ต้องมีปีกกานี้ปิด DQN ก่อน

 strategyDefs.forEach((def,i)=>{
  let pick=def[2](s)
  last[i]=pick

  if(acc(dna[i])===maxAcc){
   if(pick==='P') pCount++
   if(pick==='B') bCount++
  }

  analysisGrid.innerHTML+=`
  <div class="analysis">
   <h3>${i+1}) ${def[0]}</h3>
   <div class="desc">${def[1]}</div>
   <div>ตัวแทง:
    <span class="${acc(dna[i])===maxAcc?'best':''}">${pick}</span>
   </div>
   <div class="per">ความแม่นยำ: ${acc(dna[i])}%</div>
   <div class="dna-row">${dna[i].join(" ")}</div>
  </div>`
 })

 let total=pCount+bCount

 summary.innerHTML=
 `📊 <b>เงื่อนไข</b><br>
 สาย % สูงสุด = ${maxAcc}%<br>
 จำนวนสายทั้งหมด = ${total} สาย<br>
 P = ${pCount} สาย<br>
 B = ${bCount} สาย`
}

render()

// ===== SAVE AI MEMORY BEFORE REFRESH =====
window.addEventListener("beforeunload", ()=>{
  localStorage.setItem("patternMemory", JSON.stringify(patternMemory))
  localStorage.setItem("Qmemory", JSON.stringify(Q))
})


// ===== LOAD AI MEMORY AFTER REFRESH =====
window.addEventListener("load", ()=>{
  const pm = localStorage.getItem("patternMemory")
  const qm = localStorage.getItem("Qmemory")

  if(pm) patternMemory = JSON.parse(pm)
  if(qm) Q = JSON.parse(qm)
})



</script>
</body>
</html>
